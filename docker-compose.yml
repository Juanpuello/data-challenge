services:
  subscription-api:
    build: .
    ports:
      - "5050:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pipeline:
    build: ./pipeline
    environment:
      - API_BASE_URL=http://subscription-api:5000
      - FULL_REFRESH=true
    depends_on:
      subscription-api:
        condition: service_healthy
    volumes:
      - ./pipeline/data:/code/data
